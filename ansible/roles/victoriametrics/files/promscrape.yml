global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'victoriametrics'
    static_configs:
      - targets:
          - 'localhost:8428'

  - job_name: 'haproxy'
    static_configs:
      - targets:
          - '172.20.0.10:8404'
          - '172.20.0.11:8404'
    scrape_interval: 10s
    metrics_path: '/metrics'

  - job_name: 'node_exporter'
    static_configs:
      - targets:
          - '172.20.0.10:9100'   # lb1
          - '172.20.0.11:9100'   # lb2
          - '172.20.0.20:9100'   # backend1
          - '172.20.0.21:9100'   # backend2
          - '172.20.0.30:9100'   # victoriametrics
          - '172.20.0.31:9100'   # grafana
    scrape_interval: 10s

  - job_name: 'backends'
    static_configs:
      - targets:
          - '172.20.0.20:8080'
          - '172.20.0.21:8080'
    scrape_interval: 10s

  - job_name: "keepalived"
    static_configs:
      - targets:
        - "172.20.0.10:9101"
        - "172.20.0.11:9101"
    scrape_interval: 5s
