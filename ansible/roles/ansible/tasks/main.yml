- name: Update package cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes
  run_once: true

- name: Install required packages
  ansible.builtin.apt:
    name:
      - openssh-server
      - openssh-client
      - sshpass
      - docker.io
      - python3-pip
      - python3-venv
      - python3-dev
      - build-essential
      - python3-setuptools
    state: present
  become: yes
  run_once: true

- name: Install Python packages
  ansible.builtin.pip:
    name:
      - requests==2.31.0
      - docker==6.1.3
      - urllib3==2.0.7
      - pyyaml==6.0.1
    state: present
    extra_args: --break-system-packages
  become: yes
  run_once: true
